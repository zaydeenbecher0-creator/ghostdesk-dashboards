<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hustle Agents — Dashboards</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#f0f0f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.wrap{text-align:center;padding:40px 20px}
.logo{font-size:13px;color:#555;letter-spacing:.12em;text-transform:uppercase;margin-bottom:32px}
h1{font-size:28px;font-weight:600;margin-bottom:8px}
.sub{font-size:15px;color:#888;margin-bottom:48px}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:560px;margin:0 auto}
.card{background:#111;border:1px solid #222;border-radius:12px;padding:28px 24px;text-decoration:none;color:#f0f0f0;transition:border-color .2s,background .2s}
.card:hover{border-color:#3b82f6;background:#131b2e}
.card-icon{font-size:28px;margin-bottom:14px}
.card-title{font-size:16px;font-weight:600;margin-bottom:6px}
.card-desc{font-size:13px;color:#666;line-height:1.6}
.footer{margin-top:48px;font-size:12px;color:#444}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">Hustle Agents HQ</div>
  <h1>Your dashboards</h1>
  <p class="sub">Ghost Desk · OutreachOS · Resume/LinkedIn</p>
  <div class="cards">
    <a class="card" href="agent1_ghostwriting.html">
      <div class="card-icon">✍️</div>
      <div class="card-title">Ghost Desk</div>
      <div class="card-desc">Content Studio · Clients · Calendar · Revenue & Reports</div>
    </a>
    <a class="card" href="onboarding_hub.html">
      <div class="card-icon">⊕</div>
      <div class="card-title">Onboarding Hub</div>
      <div class="card-desc">Welcome · Intake · Contract · Notion Sync</div>
    </a>
  </div>
  <div class="footer">$5,000 MRR in 90 days · Powered by Claude</div>
</div>
</body>
</html>
